interface:
  display_name: "Eucalyptus"
  short_description: "Turn Excel workbooks into APIs"
  default_prompt: "Use $eucalyptus to inspect Excel-backed API models, choose locale, upload a workbook, discover IO, compile, run playground, manage saved tests, and manage destination defaults."
dependencies:
  tools:
    - type: "mcp"
      value: "eucalyptus"
      description: "Eucalyptus MCP server for Excel workbook model, version, IO discovery, compile, playground, saved tests, destination defaults, logs, and metrics workflows"
      transport: "streamable_http"
      url: "https://eucalyptus.qdo.ee/api/mcp"
policy:
  allow_implicit_invocation: true
